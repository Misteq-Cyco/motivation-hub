<!DOCTYPE html>
<html>
    <head>
        <title>Motivation Hub</title>
        <link rel="stylesheet"
        href="style.css">
    </head>

    <body>

        <h1>Motivation Hub</h1>

        <div class="quote-box">
<p id="quote">Click the button to be motivated!</p>
<button onclick="newQuote()">New Quote</button>
        </div>
        <div class="task-box">
            <input id="taskInput" placeholder="Enter task">
            <button onclick="addTask()">Add Task</button>
            <ul id="taskList"></ul>
        </div>

        <script src="script.js"></script>
        
    </body>
</html>
